  <!--Tähän tulee sivuston pääsisältö-->
  <main>
    <h1>Pokehaku</h1>
    <div class="text-center">
      <!--Tässä hakukenttä ja sen alla painike, jolla haetaan tietoa.-->
      <input class="mt-5" type="text" id="pokemonName" placeholder="Enter Pokemon name">
      <button onclick="poke()" style="color: rgba(165, 10, 5, 0.817);">Hae</button>
      <!--Tänne tulee näkyviin pokenimi, pokekuva ja muut tiedot-->
      <p id="nimi" class="mt-4">Kirjoita laatikkoon Pokemonin nimi</p>
      <div id="pokenkuva"></div>
      <div id="kaannetty"></div> <!--Tähän ilmestyy "Käännä" -painike-->
      <p id="pokeinfo"></p>
    </div>
  </main>

  <script>
    let poketiedot = null; //Määritetään poketiedot globaaliksi muuttujaksi, tällä hetkellä muuttujalla ei arvoa.
    let name = ""; //Määritetään pokemonin nimi globaaliksi muuttujaksi, tällä hetkellä tyhjä merkkijono.

    function poke() {
      const pokeName = document.getElementById("pokemonName").value.toLowerCase(); //Hakukenttään kirjoitettu pokenimi käännetään pieniksi kirjaimiksi.

      //Haetaan poketiedot, siirretään ne seuraavaksi suoritettavalle funktiolle pokekuva ja määritetään virhetilanteen viesti
      fetch(`https://pokeapi.co/api/v2/pokemon/${pokeName}`) //Käytetään aiemmin määritettyä muuttujaa pokeName, haetaan vastaavaa tietoa Poke APIsta.
        .then(function (response) {
          return response.json();
        })
        .then(function (responseJson) {
          pokekuva(responseJson);
        })
        .catch(function (error) {
          document.getElementById("pokenkuva").innerHTML = "<p>Tietoa ei pysty näyttämään</p>";
        })

      document.getElementById("pokeinfo").innerHTML = ""; //Tyhjentää käännä-painikkeen näyttämät tiedot kun tehdään uusi haku
      document.getElementById("kaannetty").innerHTML = ""; //Piilottaa myös painikkeen virhetilanteessa
      document.getElementById("nimi").innerHTML = ""; //Piilottaa pokemonin nimen virhetilanteessa
    }

    function pokekuva(vast) {
      poketiedot = vast; //Tallennetaan APIsta haetut tiedot poketiedot merkkijonoon
      let pokeurl = vast.sprites.front_default; //Pokemonin etukuva tallennetaan muuttujaan pokeurl.
      name = document.getElementById("pokemonName").value; //Lisätään hakukenttään kirjoitettu nimi nimi-muuttujaan.

      document.getElementById("nimi").innerHTML = "<b>" + name + "</b>"; //Näytetään hakukenttään kirjoitettu nimi sivulla.
      document.getElementById("pokenkuva").innerHTML = "<img src='" + pokeurl + "' alt='pokemon image'>"; //Näytetään sivustolla pokemonin kuva.
      document.getElementById("pokemonName").value = ""; //Tyhjentää hakukentän.
      document.getElementById("kaannetty").innerHTML = `<button onclick="kaanna()">Käännä</button>`; //Laitetaan diviin painike "Käännä", joka ilmestyy poketietoa hakiessa. Painiketta painaessa tehdään funktio kaanna().
    }

    function kaanna() {
      let pokeselka = poketiedot.sprites.back_default; //Aiemmin poketietoihin on tallennettu kaikki APIsta haettu tieto, tässä niistä tiedoista haetaan kuva
      let tiedot = ""; //Määritetään merkkijono alempana käytettävää for-loopia varten.
      let tyyppi = "";

      document.getElementById("nimi").innerHTML = "<b>" + name + "</b>"; //Näytetään sivulla haetun Pokemonin nimi
      document.getElementById("pokenkuva").innerHTML = "<img src='" + pokeselka + "' alt='Pokemon back image'>"; //Korvataan pokekuva käännetyllä pokemonin kuvalla

      //For loop listaa APIn objektitaulukoiden osat ja tallentaa ne valittuihin merkkijonoihin. 
      for (let i = 0; i < poketiedot.abilities.length; i++) {
        tiedot += poketiedot.abilities[i].ability.name + "<br>"; // Listataan pokemonien taidot
      }

      for (let k = 0; k < poketiedot.types.length; k++) {
        tyyppi += poketiedot.types[k].type.name + "<br>"; //Listataan pokemonin eri tyypit
      }

      //Näytetään pokemonin exp ja for loopeilla listatut pokemonien tiedot sivustolla
      document.getElementById("pokeinfo").innerHTML = "<b>Exp:</b> " + poketiedot.base_experience
        + " <br><b>Taidot:</b><br>" + tiedot
        + "<b>Tyypit:</b><br>" + tyyppi;
    }
  </script>
</body>
