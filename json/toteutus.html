  <!--Tähän tulee sivuston pääsisältö-->
  <main>
    <div id="vastaus" class="text-center"></div> <!--Täällä näkyvät haetut tiedot-->
  </main>

  <script>
    //Haetaan tietoa tehdystä tietueesta
    fetch('../jsontietue/toinentietue.json')
      .then(function (response) {
        return response.json();
      })
      //Siirretään data funktiolle kerro
      .then(function (responseJson) {
        kerro(responseJson);
      })

      //Jos tiedonhaussa tapahtuu virhe, niin tämä teksti näkyy sivulla
      .catch(function (error) {
        document.getElementById("vastaus").innerHTML = "<p>Tietoa ei voida hakea</p>";
      })

    function kerro(obj) {

      //let tiedot määrittää, mitä "tiedot" sisältää
      let tiedot = "<h1>" + obj.nimi + "</h1><br>"
        + "<p>Osallistujat: " + obj.osallistujat + "kpl</p>"
        + "Osallistujien nimet:<br>";

      //Taulukon nimet listataan tiedot muuttujaan, for silmukka käy taulukon läpi vaihe kerrallaan
      for (let i = 0; i < obj.nimet.length; i++) {
        tiedot += obj.nimet[i] + "</br>";
      }

      //Lisätään kurssin päivämäärät ja kuva
      tiedot += "<br><p>Kurssin kesto: " + obj.alku + " - " + obj.loppu + ", eli se kestää " + obj.kesto + ".</p>";
      tiedot += "<p><img src='" + obj.kuva + "' id= 'toteutusimg'><p>";

      //Näyttää tiedot divissä, jonka id=vastaus
      document.getElementById("vastaus").innerHTML = tiedot;
    }

  </script>
</body>
