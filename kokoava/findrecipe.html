<!DOCTYPE html>
<html lang="en">

<head>
    <title>Delish! - Cooking inspiration</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--Google fontti-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cookie&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Pacifico&display=swap"
        rel="stylesheet">
    <!--Bootstrap ja oma CSS linkit-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="kokoava.css">
</head>

<body>
    <!--Responsiivinen bootstrap navigaatio-->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="kuvat/logo.webp" alt="cooking app logo" id="logo" class="d-inline-block align-text-center">
                Delish!</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse flex-row-reverse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a id="nav-button" class="btn me-4" href="index.html">Recipe of the
                            day</a>
                    </li>
                    <li class="nav-item">
                        <a id="nav-button" class="btn active me-4" aria-current="page" href="findrecipe.html">Find
                            recipes</a>
                    </li>
                    <li class="nav-item">
                        <a id="nav-button" class="btn me-4" href="links.html">More recipes</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!--Sivuston bannerikuva-->
    <img src="kuvat/herobanner.webp" alt="table full of food" id="bannerimg">


    <!--Tähän tulee sivuston pääsisältö-->
    <main>
        <section>
            <div class="container mt-5">
                <h1 class="text-center">Search for <em>recipes</em></h1>
                <!--Painikkeet eri reseptityypeille.-->
                <div class="text-center">
                    <button class="btn" onclick="hae(this)" id="breakfast">Breakfast</button>
                    <!--Kerrotaan funktiolle, mitä painiketta on painettu ja nämä tiedot lähtee funktiolle.-->
                    <button class="btn" onclick="hae(this)" id="lunch">Lunch</button>
                    <button class="btn" onclick="hae(this)" id="dinner">Dinner</button>
                    <button class="btn" onclick="hae(this)" id="snack">Snack</button>
                </div>

                <!--Tänne tulee reseptinimien listat painikkeita painessa-->
                <p class="text-center mt-4">Find recipes by meal type. Click recipe names to get
                    instructions!
                </p>
                <div id="lista" class="text-center"></div>
                <!--Tänne tulee reseptinimiä painaessa ohjeet ruoan laittoon.-->
                <div id="ruudukko" class="mt-5">
                    <div class="row">
                        <div class="col-md mb-4" id="ainekset"></div>
                        <div class="col-md" id="resepti"></div>
                    </div>
                </div>

        </section>
    </main>

    <!--Lisätään alatunniste, jossa Bootstrapin svg-kuva linkkinä omaan Githubiin ja tekijänoikeudet. -->
    <footer class="mt-5 p-4 bg-dark text-white text-center">
        <a href="https://github.com/Muff1ne" target="_blank">
            <img src="kuvat/github.svg" alt="github icon">
        </a>
        <p class="mt-4">images @ Wikipedia Commons & in good taste</p>
    </footer>

    <script>

        function hae(button) { //button-parametri välittää klikatun painikkeen tiedot.
            const type = button.id; //Haetaan painetun painikkeen id.

            fetch(`https://dummyjson.com/recipes/meal-type/${type}`) //Haetaan klikattua painikkeen id:tä vastaava ruokatyyppi APIsta.
                .then(function (response) {
                    return response.json();
                })
                .then(function (responseJson) {
                    vast(responseJson);
                })
                .catch(function (error) {
                    document.getElementById("nimi").innerHTML = "Tietoa ei pysty näyttämään";
                })

            //Tyhjennetään painiketta painaessa ainekset ja resepti laatikot jos niissä on jotain sisältöä.
            document.getElementById("ainekset").innerHTML = "";
            document.getElementById("resepti").innerHTML = "";
        }

        function vast(vast) {
            let nimilista = "";
            for (i = 0; i < vast.recipes.length; i++) { //For loopilla käydään läpi haetun tyypin reseptit.
                nimilista += "<li class='lista-reseptit' onclick='nayta(" + vast.recipes[i].id + ")'>" + vast.recipes[i].name + "</li>"; //Näytetään haetut reseptit listana.
            }
            document.getElementById("lista").innerHTML = "<br><ul class='list-unstyled'>" + nimilista + "</ul>";
        }

        function nayta(reseptiikka) {
            fetch(`https://dummyjson.com/recipes/${reseptiikka}`)
                .then(function (response) {
                    return response.json();
                })
                .then(function (responseJson) {
                    tarkkaResepti(responseJson);
                })
                .catch(function (error) {
                    document.getElementById("resepti").innerHTML = "Tietoa ei pysty näyttämään";
                })
        }

        function tarkkaResepti(reseptit) {
            let ainesosat = "";
            let ohjeet = "";

            for (let i = 0; i < reseptit.ingredients.length; i++) {
                ainesosat += reseptit.ingredients[i] + "<br>"; //Randomisti valitun reseptin reseptiikka listataan tässä kohta kerrallaan.
            }

            for (let j = 1; j < reseptit.instructions.length; j++) {
                ohjeet += j + ". " + reseptit.instructions[j] + "<br>"; //Listataan myös ohjeet reseptin valmistukseen samalla tavoin.
            }
            document.getElementById("resepti").innerHTML = "<b>Instructions:</b><br>" + ohjeet;
            document.getElementById("ainekset").innerHTML = "<b>Ingredients:</b><br>" + ainesosat;
        }


    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
