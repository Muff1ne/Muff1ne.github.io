        rel="stylesheet">

        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="kokoava.css">
</head>

<body>
    <!--Responsiivinen bootstrap navigaatio-->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="kuvat/logo.webp" alt="cooking app logo" id="logo" class="d-inline-block align-text-center">
                Delish!</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse flex-row-reverse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a id="nav-button" class="btn active me-4" aria-current="page" href="index.html">Recipe of the
                            day</a>
                    </li>
                    <li class="nav-item">
                        <a id="nav-button" class="btn me-4" href="findrecipe.html">Find recipes</a>
                    </li>
                    <li class="nav-item">
                        <a id="nav-button" class="btn me-4" href="links.html">More recipes</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!--Sivuston bannerikuva-->
    <img src="kuvat/herobanner.webp" alt="hero image" id="bannerimg">


    <!--Tähän tulee sivuston pääsisältö-->
    <main>
        <h1>Hae reseptiä</h1>
        <div>
            <button onclick="hae()" style="color: rgba(165, 10, 5, 0.817);">Hae</button>
            <!--Tänne tulee näkyviin pokenimi, pokekuva ja muut tiedot-->
            <p id="nimi" class="mt-4">Kirjoita laatikkoon kaipaatko aamiaista, lounasta, päivällistä, vai illallista.</p>
            <div id="reseptiikka"></div>

        </div>
    </main>
    <script>
    
   
    function hae() {
      const type = document.getElementById("type").value; //Hakukenttään kirjoitettu pokenimi käännetään pieniksi kirjaimiksi.

      //Haetaan poketiedot, siirretään ne seuraavaksi suoritettavalle funktiolle pokekuva ja määritetään virhetilanteen viesti
      fetch(`https://dummyjson.com/recipes/mealType${type}`) //Käytetään aiemmin määritettyä muuttujaa pokeName, haetaan vastaavaa tietoa Poke APIsta.
        .then(function (response) {
          return response.json();
        })
        .then(function (responseJson) {
          pokekuva(responseJson);
        })
        .catch(function (error) {
          document.getElementById("reseptiikka").innerHTML = "<p>Tietoa ei pysty näyttämään</p>";
        })

      document.getElementById("recipeName").innerHTML = ""; 
      document.getElementById("nimi").innerHTML = ""; 
    }

    

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
